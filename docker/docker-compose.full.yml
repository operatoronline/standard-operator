services:
  # ─────────────────────────────────────────────
  # Operator Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm operator-agent -m "Hello"
  # ─────────────────────────────────────────────
  operator-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: operator-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.operator/config.json:ro
      - operator-workspace:/root/.operator/workspace
      - operator-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["operator", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Operator Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  operator-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: operator-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.operator/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - operator-workspace:/root/.operator/workspace
      # NPM cache for faster MCP server installs
      - operator-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  operator-workspace:
  operator-npm-cache: # Cache npm packages to speed up MCP server installations
